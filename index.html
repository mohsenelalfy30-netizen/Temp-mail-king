<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temp Mail King</title>
    <meta name="description" content="Professional temporary email web application with smart link logic and ad spaces.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <script type="module">
        import { LANGUAGES } from './src/i18n.ts';
        const head = document.head;
        LANGUAGES.forEach(lang => {
            const link = document.createElement('link');
            link.rel = 'alternate';
            link.hreflang = lang.code;
            link.href = `${window.location.origin}/?lang=${lang.code}`;
            head.appendChild(link);
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        iosBlue: '#007AFF',
                        darkBg: '#000000',
                        darkCard: '#111111',
                        darkBorder: '#222222',
                        darkInput: '#222222'
                    }
                }
            }
        }
    </script>

    <style>
        .lucide { display: inline-flex !important; align-self: center; }
        body { 
            margin: 0; padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body.dark { background-color: #000000; }
        
        /* --- حاويات الإعلانات الذكية (Ad Containers) --- */
        .ad-slot-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(243, 244, 246, 0.6);
            flex-shrink: 0; /* يمنع الحاوية من الانكماش */
            z-index: 10;
        }
        .dark .ad-slot-wrapper { background: rgba(34, 34, 34, 0.6); }

        /* التجاوب التلقائي: 50px للموبايل / 90px للتابلت */
        @media (max-width: 600px) { .ad-slot-wrapper { height: 50px !important; } }
        @media (min-width: 601px) { .ad-slot-wrapper { height: 90px !important; } }

        /* منطقة التمرير الداخلي */
        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .scrollable-content::-webkit-scrollbar { width: 0px; background: transparent; }

        /* المسافة الدقيقة 3px */
        .gap-separator { height: 3px; width: 100%; flex-shrink: 0; background: transparent; }

        /* أنميشن المودال */
        .modal-slide { transition: transform 0.3s ease-out; }

        .fi-circle {
            border-radius: 50%;
            width: 24px !important;
            height: 24px !important;
            background-size: cover;
            border: 1px solid rgba(128, 128, 128, 0.2);
        }
    </style>
</head>
<body class="bg-white text-black dark:bg-darkBg dark:text-white">

    <header class="flex items-center justify-between px-4 h-[60px] border-b border-gray-200 dark:border-darkBorder bg-white dark:bg-darkCard shrink-0 z-50">
        <button id="themeToggle" class="p-2 -ms-2 rounded-full hover:bg-gray-100 dark:hover:bg-darkBorder">
            <i data-lucide="moon" id="themeIcon" class="w-6 h-6"></i>
        </button>
        <h1 class="text-xl font-bold tracking-tight" data-i18n="page_title">Temp Mail King</h1>
        <button id="settingsBtn" class="p-2 -me-2 rounded-full hover:bg-gray-100 dark:hover:bg-darkBorder">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </button>
    </header>

    <main id="mainContent" class="flex-1 flex flex-col w-full overflow-hidden relative">
        
        <div id="homeTab" class="flex flex-col h-full w-full">
            <div class="bg-white dark:bg-darkCard p-4 border-b border-gray-200 dark:border-darkBorder space-y-3 shrink-0">
                <input type="text" id="emailPrefix" data-i18n-placeholder="email_prefix" class="w-full bg-gray-50 dark:bg-darkInput border border-gray-300 dark:border-darkBorder rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-iosBlue/50 text-black dark:text-white">
                <div class="relative">
                    <select id="emailDomain" class="w-full bg-gray-50 dark:bg-darkInput border border-gray-300 dark:border-darkBorder rounded-xl px-4 py-3 pe-10 text-sm appearance-none text-black dark:text-white" dir="ltr"></select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
                </div>
                <input type="password" id="emailPassword" data-i18n-placeholder="password" class="w-full bg-gray-50 dark:bg-darkInput border border-gray-300 dark:border-darkBorder rounded-xl px-4 py-3 text-sm focus:outline-none text-black dark:text-white">
                <button id="createBtn" data-i18n="create_btn" class="w-full bg-iosBlue hover:bg-blue-600 text-white font-bold rounded-xl py-3.5 text-base transition-all active:scale-[0.98]"></button>
            </div>

            <div class="ad-slot-wrapper border-b border-gray-200 dark:border-darkBorder">
                <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="YOUR_ID" data-ad-slot="SLOT_1"></ins>
            </div>

            <div class="scrollable-content flex flex-col">
                <div id="usageArea" class="hidden p-4 border-b border-gray-200 dark:border-darkBorder bg-gray-50/50 dark:bg-darkCard/30 space-y-3">
                    <div class="flex items-center w-full bg-white dark:bg-darkInput border border-gray-300 dark:border-darkBorder rounded-lg px-2" dir="ltr">
                        <input type="text" id="readOnlyEmail" readonly class="flex-1 bg-transparent p-2.5 text-sm font-mono text-black dark:text-white outline-none">
                        <button id="copyEmailBtn" class="p-2 text-iosBlue"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                    <div class="bg-blue-50 dark:bg-blue-900/10 border border-blue-100 dark:border-blue-800/30 rounded-lg p-3 flex gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500 shrink-0 mt-0.5"></i>
                        <p id="activationHintText" class="text-xs text-blue-700 dark:text-blue-300"></p>
                    </div>
                </div>
                
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold" data-i18n="inbox_title">Inbox</h2>
                        <button id="refreshInboxBtn" class="p-2 text-gray-400 hover:text-iosBlue"><i data-lucide="refresh-cw" id="refreshIcon" class="w-5 h-5"></i></button>
                    </div>
                    <div id="messagesList" class="space-y-4">
                        <div class="flex flex-col items-center justify-center py-12 text-gray-400">
                            <i data-lucide="mail-open" class="w-12 h-12 mb-2 opacity-20"></i>
                            <p class="text-sm" data-i18n="inbox_empty">No messages yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="libraryTab" class="hidden flex flex-col h-full w-full bg-white dark:bg-darkBg">
            <div class="ad-slot-wrapper border-b border-gray-200 dark:border-darkBorder">
                <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="YOUR_ID" data-ad-slot="SLOT_TOP_LIB"></ins>
            </div>

            <div class="scrollable-content p-4">
                <h2 class="text-2xl font-black mb-6" data-i18n="library_title">Library</h2>
                <div id="libraryList" class="grid grid-cols-1 gap-3">
                    </div>
            </div>

            <div class="ad-slot-wrapper border-t border-gray-200 dark:border-darkBorder">
                <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-client="YOUR_ID" data-ad-slot="SLOT_BOTTOM_LIB"></ins>
            </div>

            <div class="gap-separator"></div>
        </div>

    </main>

    <div class="flex flex-col shrink-0 z-[60] shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <nav class="h-[65px] bg-white dark:bg-darkCard border-t border-gray-200 dark:border-darkBorder flex justify-around items-center px-4">
            <button id="navLibrary" class="flex flex-col items-center justify-center w-20 h-full text-gray-400 transition-colors">
                <i data-lucide="folder" class="w-6 h-6"></i>
                <span class="text-[11px] font-bold mt-1" data-i18n="nav_library">Library</span>
            </button>
            <button id="navHome" class="flex flex-col items-center justify-center w-20 h-full text-iosBlue transition-colors">
                <i data-lucide="mail" class="w-6 h-6"></i>
                <span class="text-[11px] font-bold mt-1" data-i18n="nav_home">Home</span>
            </button>
        </nav>

        <div id="pushAd" class="h-[50px] bg-iosBlue dark:bg-blue-900/30 text-white flex items-center justify-center text-xs font-medium relative overflow-hidden">
            <span data-i18n="push_ad">Premium Servers: Faster & Secure</span>
            <button id="closeAdBtn" class="absolute left-4 p-2"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-white dark:bg-darkBg z-[100] hidden flex-col modal-slide translate-y-full">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-darkBorder h-[60px] shrink-0">
            <div class="flex items-center gap-2">
                <button id="backBtn" class="hidden p-2 -ms-2"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                <h2 id="settingsTitle" class="text-xl font-bold" data-i18n="settings_title">Settings</h2>
            </div>
            <button id="closeSettingsModal" class="p-2 -me-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>

        <div class="flex-1 relative overflow-hidden">
            <div id="mainMenuView" class="absolute inset-0 overflow-y-auto p-4 space-y-3">
                <button id="btnLangMenu" class="w-full flex items-center p-4 bg-gray-50 dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-darkBorder">
                    <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-iosBlue"><i data-lucide="globe" class="w-5 h-5"></i></div>
                    <span class="ms-4 font-bold" data-i18n="lang_option">Language</span>
                    <i data-lucide="chevron-right" class="ms-auto w-5 h-5 text-gray-400"></i>
                </button>
                <button id="btnPrivacyMenu" class="w-full flex items-center p-4 bg-gray-50 dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-darkBorder">
                    <div class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-500"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                    <span class="ms-4 font-bold" data-i18n="privacy_policy_title">Privacy Policy</span>
                    <i data-lucide="chevron-right" class="ms-auto w-5 h-5 text-gray-400"></i>
                </button>
            </div>

            <div id="langView" class="absolute inset-0 hidden flex-col bg-white dark:bg-darkBg">
                <div class="p-4 border-b border-gray-200 dark:border-darkBorder">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="langSearch" class="w-full bg-gray-50 dark:bg-darkInput border border-gray-200 dark:border-darkBorder rounded-xl ps-10 p-3 outline-none" data-i18n-placeholder="search_lang">
                    </div>
                </div>
                <div id="langGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 gap-2"></div>
            </div>

            <div id="textContentView" class="absolute inset-0 hidden overflow-y-auto p-6 bg-white dark:bg-darkBg prose dark:prose-invert max-w-none">
                <div id="textContentBody"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./domains.js"></script>
    <script type="module" src="./logic.js"></script>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
        // Initialize Lucide Icons
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Tab Switching Logic to maintain layouts
            const homeBtn = document.getElementById('navHome');
            const libBtn = document.getElementById('navLibrary');
            const homeTab = document.getElementById('homeTab');
            const libTab = document.getElementById('libraryTab');

            homeBtn.addEventListener('click', () => {
                homeTab.classList.remove('hidden');
                libTab.classList.add('hidden');
                homeBtn.classList.add('text-iosBlue'); homeBtn.classList.remove('text-gray-400');
                libBtn.classList.remove('text-iosBlue'); libBtn.classList.add('text-gray-400');
            });

            libBtn.addEventListener('click', () => {
                libTab.classList.remove('hidden');
                homeTab.classList.add('hidden');
                libBtn.classList.add('text-iosBlue'); libBtn.classList.remove('text-gray-400');
                homeBtn.classList.remove('text-iosBlue'); homeBtn.classList.add('text-gray-400');
            });
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
