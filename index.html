    <script type="module">
        import { LANGUAGES } from './src/i18n.ts';
        const head = document.head;
        LANGUAGES.forEach(lang => {
            const link = document.createElement('link');
            link.rel = 'alternate';
            link.hreflang = lang.code;
            link.href = `${window.location.origin}/?lang=${lang.code}`;
            head.appendChild(link);
        });
        const defaultLink = document.createElement('link');
        defaultLink.rel = 'alternate';
        defaultLink.hreflang = 'x-default';
        defaultLink.href = `${window.location.origin}/?lang=en`;
        head.appendChild(defaultLink);
    </script>

    <script>
        lucide.createIcons();
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }

        window.deleteEmailRecord = function(emailToDelete) {
            try {
                const library = JSON.parse(localStorage.getItem('emailLibrary') || '[]');
                const updatedLibrary = library.filter(item => item.email !== emailToDelete);
                localStorage.setItem('emailLibrary', JSON.stringify(updatedLibrary));
                window.dispatchEvent(new CustomEvent('syncLibrary', { detail: updatedLibrary }));
            } catch (error) {
                console.error("Deletion error:", error);
            }
        };

        window.addEventListener('syncLibrary', (event) => {
            const input = document.getElementById('readOnlyEmail');
            if (!input) return;
            const currentEmail = input.value;
            const library = event.detail || [];
            if (currentEmail && !library.some(item => item.email === currentEmail)) {
                const usage = document.getElementById('usageArea');
                if (usage) { usage.classList.add('hidden'); usage.classList.remove('flex'); }
                input.value = '';
                document.getElementById('readOnlyPassword').value = '';
                const list = document.getElementById('messagesList');
                if (list) {
                    list.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-gray-500"><i data-lucide="mail-open" class="w-16 h-16 mb-4 opacity-20"></i><p data-i18n="inbox_empty">No messages</p></div>`;
                    delete list.dataset.renderedHash;
                    if (window.lucide) lucide.createIcons();
                }
            }
        });
    </script>
